<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quick Add Task - Deep Work</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#456a7d",
                        "background-light": "#f5f8fa",
                        "background-dark": "#1b242d",
                        "card-dark": "#2A353F",
                        "accent-gold": "#A8906F"
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .ios-shadow {
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-hidden h-screen w-screen flex items-center justify-center">
<!-- Blurred Background Simulation (Previous Screen Content) -->
<div class="absolute inset-0 z-0 overflow-hidden opacity-40 pointer-events-none">
<div class="p-8">
<div class="h-8 w-32 bg-primary/20 rounded mb-6"></div>
<div class="space-y-4">
<div class="h-24 w-full bg-primary/10 rounded-xl"></div>
<div class="h-24 w-full bg-primary/10 rounded-xl"></div>
<div class="h-24 w-full bg-primary/10 rounded-xl"></div>
<div class="h-24 w-full bg-primary/10 rounded-xl"></div>
</div>
</div>
</div>
<!-- Modal Overlay Backdrop -->
<div class="absolute inset-0 z-10 glass-blur bg-black/40"></div>
<!-- Main Content Container -->
<div class="relative z-20 w-full max-w-[390px] px-6 flex flex-col items-center">
<!-- Header / Dismiss Area -->
<div class="w-full flex justify-between items-center mb-10 px-2">
<button class="flex items-center justify-center size-10 rounded-full bg-white/5 hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white/70">close</span>
</button>
<div class="flex items-center gap-2">
<span class="size-2 rounded-full bg-primary animate-pulse"></span>
<p class="text-sm font-bold tracking-widest uppercase text-white/50">Focus Mode</p>
</div>
<div class="w-10"></div> <!-- Spacer -->
</div>
<!-- Central Input Card -->
<div class="w-full bg-card-dark rounded-xl shadow-[0px_20px_50px_rgba(0,0,0,0.5)] border border-white/5 overflow-hidden">
<!-- Headline Text & Input -->
<div class="p-6">
<h1 class="text-white/60 text-xs font-bold uppercase tracking-widest mb-4">Quick Add Task</h1>
<div class="flex flex-col gap-4">
<label class="flex flex-col w-full">
<textarea autofocus="" class="form-input w-full p-0 bg-transparent border-none focus:ring-0 text-2xl font-semibold placeholder:text-white/20 text-white resize-none min-h-[120px]" placeholder="What needs to be done?"></textarea>
</label>
</div>
</div>
<!-- Metadata Chips Row -->
<div class="flex gap-2 px-6 pb-6 overflow-x-auto no-scrollbar">
<div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-lg bg-white/5 border border-white/10 pl-2 pr-4 cursor-pointer hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[18px] text-primary">calendar_today</span>
<p class="text-white/80 text-xs font-semibold">Today</p>
</div>
<div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-lg bg-white/5 border border-white/10 pl-2 pr-4 cursor-pointer hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[18px] text-accent-gold">flag</span>
<p class="text-white/80 text-xs font-semibold">Priority</p>
</div>
<div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-lg bg-white/5 border border-white/10 pl-2 pr-4 cursor-pointer hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[18px] text-white/40">folder</span>
<p class="text-white/80 text-xs font-semibold">Inbox</p>
</div>
</div>
<!-- Bottom Action Button -->
<div class="px-6 py-4 bg-black/20 flex items-center justify-between">
<p class="text-[10px] text-white/30 uppercase tracking-tighter">Press ⌘+Enter to save</p>
<button class="flex min-w-[100px] cursor-pointer items-center justify-center rounded-lg h-10 px-6 bg-primary text-white text-sm font-bold tracking-wide shadow-lg shadow-primary/20 hover:brightness-110 active:scale-95 transition-all">
<span>Save Task</span>
</button>
</div>
</div>
<!-- Help/Indicator Text below card -->
<div class="mt-8 flex flex-col items-center gap-4 opacity-50">
<div class="flex items-center gap-6">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">keyboard_command_key</span>
<span class="text-xs">L</span>
<span class="text-xs text-white/50">List</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">keyboard_command_key</span>
<span class="text-xs">K</span>
<span class="text-xs text-white/50">Project</span>
</div>
</div>
<p class="text-[11px] font-medium tracking-[0.2em] uppercase">Deep Work OS v1.0</p>
</div>
</div>
<!-- iOS Home Indicator -->
<div class="fixed bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-white/20 rounded-full z-50"></div>
</body></html>
